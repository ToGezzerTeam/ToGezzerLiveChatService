services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: togezzer-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: togezzer-live-chat-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3000
      RABBITMQ_HOST: rabbitmq
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      MEDIASOUP_MIN_PORT: ${MEDIASOUP_MIN_PORT:-40000}
      MEDIASOUP_MAX_PORT: ${MEDIASOUP_MAX_PORT:-57000}
    ports:
      - "3000:3000"
      - "${MEDIASOUP_MIN_PORT:-40000}-${MEDIASOUP_MAX_PORT:-57000}:${MEDIASOUP_MIN_PORT:-40000}-${MEDIASOUP_MAX_PORT:-57000}/udp"
      - "${MEDIASOUP_MIN_PORT:-40000}-${MEDIASOUP_MAX_PORT:-57000}:${MEDIASOUP_MIN_PORT:-40000}-${MEDIASOUP_MAX_PORT:-57000}/tcp"